services:
  postgres:
    image: postgres:16-alpine
    container_name: reconforge-postgres
    environment:
      POSTGRES_DB: reconforge
      POSTGRES_USER: reconforge
      POSTGRES_PASSWORD: reconforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconforge -d reconforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reconforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: reconforge-backend
    env_file:
      - ./backend/.env.example
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    container_name: reconforge-worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - ./backend/.env.example
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: reconforge-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
